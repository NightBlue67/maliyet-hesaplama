<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maliyet Hesaplama</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      padding-bottom: 80px; /* toolbar space */
    }

    /* SENİN ESKİ TASARIMIN BURADA KORUNUR */
    input, select, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      font-size: 16px;
    }

    /* TOOLBAR (EKLENDİ - TASARIMI BOZMAZ) */
    #navBar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      gap: 6px;
      padding: 8px;
      background: #111;
      z-index: 999999;
      box-sizing: border-box;
    }

    #navBar button {
      flex: 1;
      border: 0;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }

    #prev { background: #444; }
    #next { background: #2d6cdf; }
    #calc { background: #16a34a; }
  </style>
</head>

<body>

<!-- ========================= -->
<!-- SENİN ORİJİNAL INPUTLARIN -->
<!-- (BURAYA DOKUNMUYORUZ)     -->
<!-- ========================= -->

<input type="number" placeholder="Gramaj">
<input type="number" placeholder="En">
<input type="number" placeholder="Boy">
<input type="number" placeholder="Tabaka">

<button onclick="hesapla()">Hesapla</button>

<!-- ========================= -->
<!-- NAV BAR EKLENTİSİ        -->
<!-- ========================= -->

<div id="navBar">
  <button id="prev">Geri</button>
  <button id="next">İleri</button>
  <button id="calc">Hesapla</button>
</div>

<!-- ========================= -->
<!-- JS (BEHAVIOR LAYER ONLY) -->
<!-- ========================= -->

<script>
(() => {

  // SADECE GERÇEK INPUTLAR (tasarım bozulmaz)
  const inputs = Array.from(document.querySelectorAll("input, select, textarea"))
    .filter(el => !el.disabled && el.type !== "hidden");

  let index = 0;

  function focus(i) {
    if (!inputs.length) return;

    index = Math.max(0, Math.min(i, inputs.length - 1));

    const el = inputs[index];
    el.focus({ preventScroll: true });

    el.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }

  function next() {
    focus(index + 1);
  }

  function prev() {
    focus(index - 1);
  }

  function hesapla() {
    let total = 0;
    inputs.forEach(i => total += Number(i.value || 0));

    alert("Toplam: " + total);
  }

  // BUTTON EVENTS
  document.getElementById("next").addEventListener("click", next);
  document.getElementById("prev").addEventListener("click", prev);
  document.getElementById("calc").addEventListener("click", hesapla);

  // INPUT TRACKING
  inputs.forEach((el, i) => {
    el.addEventListener("focus", () => index = i);

    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        next();
      }
    });
  });

  // KEYBOARD FIX (klavye üstüne çıkma problemi çözülür)
  const bar = document.getElementById("navBar");

  function adjustForKeyboard() {
    const vh = window.visualViewport?.height || window.innerHeight;
    const keyboardOpen = vh < window.innerHeight * 0.75;

    bar.style.transform = keyboardOpen
      ? "translateY(-40px)"
      : "translateY(0)";
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", adjustForKeyboard);
  } else {
    window.addEventListener("resize", adjustForKeyboard);
  }

})();
</script>

</body>
</html>
