<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maliyet Hesaplama</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      padding-bottom: 90px;
    }

    input, select, textarea {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button.main {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 12px;
      font-size: 16px;
    }

    /* MOBILE TOOLBAR */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: #111;
      display: flex;
      gap: 6px;
      padding: 8px;
      z-index: 99999;
      box-sizing: border-box;
    }

    .toolbar button {
      flex: 1;
      border: 0;
      border-radius: 8px;
      font-size: 14px;
      color: white;
    }

    .prev { background: #444; }
    .next { background: #2d6cdf; }
    .calc { background: #16a34a; }
  </style>
</head>

<body>

  <!-- ===================== -->
  <!-- SENİN MEVCUT INPUTLAR -->
  <!-- ===================== -->

  <input type="number" placeholder="Malzeme maliyeti">
  <input type="number" placeholder="İşçilik">
  <input type="number" placeholder="Nakliye">
  <input type="number" placeholder="Diğer">

  <button class="main" onclick="hesapla()">Hesapla</button>

  <!-- ===================== -->
  <!-- MOBİL TOOLBAR -->
  <!-- ===================== -->

  <div class="toolbar">
    <button class="prev" id="prevBtn">Geri</button>
    <button class="next" id="nextBtn">İleri</button>
    <button class="calc" id="calcBtn">Hesapla</button>
  </div>

  <!-- ===================== -->
  <!-- JS -->
  <!-- ===================== -->

  <script>
    const inputs = Array.from(
      document.querySelectorAll("input, select, textarea")
    ).filter(el =>
      el.type !== "hidden" &&
      !el.disabled
    );

    let currentIndex = 0;

    function focusInput(index) {
      if (!inputs.length) return;

      currentIndex = Math.max(0, Math.min(index, inputs.length - 1));

      const el = inputs[currentIndex];
      if (!el) return;

      el.focus({ preventScroll: true });

      el.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }

    function next() {
      focusInput(currentIndex + 1);
    }

    function prev() {
      focusInput(currentIndex - 1);
    }

    function hesapla() {
      let total = 0;

      inputs.forEach(i => {
        const val = Number(i.value || 0);
        if (!isNaN(val)) total += val;
      });

      alert("Toplam maliyet: " + total);
    }

    // toolbar events
    document.getElementById("nextBtn").addEventListener("click", next);
    document.getElementById("prevBtn").addEventListener("click", prev);
    document.getElementById("calcBtn").addEventListener("click", hesapla);

    // input tracking
    inputs.forEach((el, i) => {
      el.addEventListener("focus", () => {
        currentIndex = i;
      });

      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          next();
        }
      });
    });

    // initial focus
    window.addEventListener("load", () => {
      setTimeout(() => focusInput(0), 300);
    });

    // expose global (PWA uyumu için)
    window.hesapla = hesapla;
  </script>

</body>
</html>
